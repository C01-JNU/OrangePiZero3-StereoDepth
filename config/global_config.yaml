# OrangePiZero3-StereoDepth 全局配置
# 重构版：支持金字塔多层，参数按层覆盖
# 最后更新: 2026年2月12日

system:
  mode: "gpu"
  debug_level: 2
  log_to_file: false
  log_file_path: "logs/stereo_depth.log"

gpu:
  enabled: true
  vulkan_version: "1.0"
  enable_validation: false
  shader_workgroup_size: [16, 16]
  max_memory_mb: 256
  use_async_transfer: true
  staging_buffer_size: 16

camera:
  width: 640
  height: 480
  fps: 30
  auto_exposure: true
  auto_white_balance: true
  denoise_strength: 0.5

# 金字塔配置
pyramid:
  enabled: true
  levels: 3
  scale_factor: 0.5
  min_size: [80, 60]

# 立体匹配算法默认参数（各层可覆盖）
stereo:
  census_window: 7
  disparity_range: 64
  min_disparity: 0
  cost_aggregation_window: 5
  uniqueness_ratio: 15
  penalty_p1: 8.0
  penalty_p2: 32.0
  use_census: true
  use_median_filter: true
  enable_postprocessing: true
  speckle_window_size: 100
  speckle_range: 32
  median_filter_size: 3

# 层独立参数覆盖
layer_overrides:
  - level: 0
  - level: 1
    census_window: 5
    disparity_range: 32
  - level: 2
    census_window: 5
    disparity_range: 16

# 标定配置（预留）
calibration:
  auto_calibrate: false
  calibration_file: "calibration_results/stereo_calibration.yml"
  use_calibration: true
  rectify_images: true
  chessboard_size: [9, 6]
  board_width: 9
  board_height: 6
  square_size: 0.15

# 性能配置
performance:
  enable_benchmark: true
  benchmark_iterations: 100
  enable_profiling: false
  target_fps: 15
  log_fps: true
  log_memory: true
  update_interval_ms: 1000
  profile_file: "logs/performance.csv"

# 输出配置
output:
  save_disparity: true
  save_depth: true
  output_format: "png"
  output_dir: "images/output"
  visualize_results: true
  use_test_images: true
  test_image_dir: "images/test"
  calibration_dir: "images/calibration"

# ROS2配置（预留）
ros2:
  enabled: false
  node_name: "stereo_depth_node"
  namespace: "stereo"
  topics:
    left_image: "/camera/left/image_raw"
    right_image: "/camera/right/image_raw"
    disparity: "/stereo/disparity"
    depth: "/stereo/depth"
    pointcloud: "/stereo/points"
  qos_depth: 10
  qos_reliability: "best_effort"
